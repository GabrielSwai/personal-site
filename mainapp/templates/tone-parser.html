<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tone Parser</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-4xl flex-col px-4 py-8 sm:px-6 lg:px-8">
    <header class="mb-8">
      <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">
        Tone Parser
      </h1>
      <p class="mt-2 max-w-2xl text-slate-600">
        Enter one or more tone-marked phrases and convert them into tone sequences.
      </p>
    </header>

    <form method="POST" action="/tone-parser" id="tone-parser-form" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
        <div class="mb-5">
            <label for="phrases">
                <h2 class="text-lg font-semibold">Phrases</h2>
                <!-- <p class="text-sm text-slate-500">
                    Put each phrase on its own line.
                </p> -->
            </label>

            <textarea
            id="phrases"
            name="phrases"
            rows="8"
            placeholder="Múkánátályá hyȏ.&#10;Wanalangira Mukosa kwȇ?&#10;Síngiwíte kási táhi."
            class="mt-3 w-full resize-y rounded-xl border border-slate-300 bg-white px-4 py-3 text-base outline-none transition placeholder:text-slate-400 focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10"
            >{% if results %}{% for result in results %}
{{ result.phrase }}{% endfor %}{% endif %}</textarea>
        </div>

        <fieldset class="mb-5">
            <legend class="block text-md font-medium text-black mb-2">
            Default tone
            </legend>

            <label>
            <input type="radio" name="default_tone" value="L" checked />
            <b class="text-2xl font-bold">L</b>
            </label>

            <label>
            <input type="radio" name="default_tone" value="M" class="ml-4"/>
            <b class="text-2xl font-bold">M</b>
            </label>
        </fieldset>

        <div class="flex flex-col gap-3 sm:flex-row">
            <button type="submit" class="bg-transparent hover:bg-slate-400 text-slate-700 font-semibold hover:text-white py-2 px-4 border border-slate-500 hover:border-transparent rounded">
            Parse tones
            </button>

            <!-- <button type="reset" class="text-slate-700 font-semibold hover:bg-slate-200 py-2 px-4 border border-transparent rounded">
            Clear
            </button> -->
        </div>
        </form>

    <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
      <div class="mb-4 flex items-center justify-between gap-4">
        <div>
          <h2 class="text-lg font-semibold">Results</h2>
          <!-- <p class="text-sm text-slate-500">
            Parsed tone sequences will appear here.
          </p> -->
        </div>

        <!-- <button
          type="button"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 hover:text-slate-900"
        >
          Copy all
        </button> -->
      </div>
      <div class="overflow-hidden rounded-xl border border-slate-200">
        {% if results %}
        <table class="w-full text-left text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-4 py-3 font-medium">Phrase</th>
              <th class="px-4 py-3 font-medium">Tone sequence</th>
            </tr>
          </thead>

          <tbody class="divide-y divide-slate-200 bg-white">
            {% for result in results %}
            <tr>
              <td class="px-4 py-3 text-slate-700">{{ result.phrase }}</td>
              <td class="px-4 py-3 font-mono text-slate-900">{{ result.tone_sequence }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        {% endif %}
      </div>
    </section>
  </main>
</body>
</html>
